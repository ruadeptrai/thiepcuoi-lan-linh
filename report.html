
<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Báo cáo xác nhận dự tiệc - Lân & Linh</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root{--wine:#8b0f1a;--gold:#c59b55;--bg:#fff8f4;--ink:#30201d;--muted:#725b55}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#fff7f2,#fffdf8);font-family:Montserrat,Arial,sans-serif;color:var(--ink);padding:26px}
    .wrap{max-width:1100px;margin:0 auto}.head{text-align:center;margin:20px 0 26px}.eyebrow{letter-spacing:.32em;color:var(--gold);font-size:12px;font-weight:800;text-transform:uppercase}.head h1{font-family:'Playfair Display',serif;color:var(--wine);font-size:44px;margin:10px 0}.card{background:#fff;border:1px solid rgba(139,15,26,.1);border-radius:24px;box-shadow:0 18px 50px rgba(80,30,20,.09);padding:22px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.kpi{text-align:center}.kpi b{display:block;color:var(--wine);font-family:'Playfair Display',serif;font-size:42px}.kpi span{font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-weight:800;color:var(--muted)}.two{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}.bar{display:flex;align-items:center;gap:10px;margin:10px 0}.bar-name{width:160px;font-size:13px}.bar-track{flex:1;height:12px;border-radius:999px;background:#f5e6df;overflow:hidden}.bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--wine));border-radius:999px}.wish{border-bottom:1px dashed rgba(139,15,26,.14);padding:12px 0}.wish:last-child{border-bottom:0}.wish b{color:var(--wine)}.wish small{display:block;color:var(--muted);margin-top:4px}.tools{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px}.btn{border:0;border-radius:999px;padding:12px 18px;background:var(--wine);color:white;font-weight:800;text-decoration:none;cursor:pointer}.btn.ghost{background:#fff;color:var(--wine);border:1px solid rgba(139,15,26,.18)}.error{background:#fff0ee;border:1px dashed rgba(139,15,26,.3);color:#6a1c22;border-radius:18px;padding:16px;line-height:1.7}.table-wrap{overflow:auto;margin-top:16px}table{width:100%;border-collapse:collapse;background:white;border-radius:18px;overflow:hidden}th,td{padding:12px;border-bottom:1px solid #f0e3dc;text-align:left;font-size:13px}th{background:#fff1eb;color:var(--wine);white-space:nowrap}@media(max-width:760px){body{padding:14px}.grid,.two{grid-template-columns:1fr}.head h1{font-size:34px}.bar-name{width:120px}.kpi b{font-size:36px}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="eyebrow">Wedding RSVP</div>
    <h1>Báo cáo xác nhận dự tiệc</h1>
    <p>Trần Lân & Thuỳ Linh · 06.06.2026</p>
  </div>
  <div id="app" class="card"><p>Đang tải dữ liệu...</p></div>
</div>
<script src="config.js"></script>
<script>
const endpoint = window.WEDDING_RSVP_ENDPOINT || '';
const app = document.getElementById('app');
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function renderReport(data){
  if(!data || !data.ok){app.innerHTML='<div class="error">Không đọc được dữ liệu. Hãy kiểm tra link Apps Script trong file config.js.</div>';return}
  const rel=data.byRelationship||{}; const max=Math.max(1,...Object.values(rel));
  const bars=Object.entries(rel).map(([k,v])=>`<div class="bar"><div class="bar-name">${esc(k)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/max*100)}%"></div></div><b>${v}</b></div>`).join('') || '<p>Chưa có dữ liệu.</p>';
  const wishes=(data.recentWishes||[]).map(w=>`<div class="wish"><b>${esc(w.name)}</b><small>${esc(w.relationship)} · ${esc(w.attendance)} · ${esc(w.guests)} người</small><p>${esc(w.wish)}</p></div>`).join('') || '<p>Chưa có lời chúc.</p>';
  app.innerHTML=`
    <div class="grid">
      <div class="card kpi"><b>${data.totalResponses||0}</b><span>Tổng phản hồi</span></div>
      <div class="card kpi"><b>${data.attendingResponses||0}</b><span>Xác nhận đi</span></div>
      <div class="card kpi"><b>${data.notAttendingResponses||0}</b><span>Không tham dự</span></div>
      <div class="card kpi"><b>${data.estimatedGuests||0}</b><span>Dự kiến số khách</span></div>
    </div>
    <div class="two">
      <div class="card"><h2>Theo mối quan hệ</h2>${bars}</div>
      <div class="card"><h2>Lời chúc mới nhất</h2>${wishes}</div>
    </div>
    <div class="tools"><button class="btn" onclick="location.reload()">Tải lại báo cáo</button><a class="btn ghost" href="index.html">Về thiệp cưới</a></div>
  `;
}
function load(){
  if(!endpoint || endpoint.includes('PASTE_')){app.innerHTML='<div class="error"><b>Chưa cấu hình Google Sheets.</b><br>Mở file <code>config.js</code>, dán link Web App Google Apps Script vào biến <code>window.WEDDING_RSVP_ENDPOINT</code>, sau đó upload lại lên GitHub.</div>';return}
  const cb='renderReport';
  const script=document.createElement('script');
  script.src=endpoint+(endpoint.includes('?')?'&':'?')+'action=summary&callback='+cb+'&t='+Date.now();
  script.onerror=()=>app.innerHTML='<div class="error">Không tải được báo cáo. Kiểm tra lại quyền Deploy Apps Script: Anyone can access.</div>';
  document.body.appendChild(script);
}
load();
</script>
</body>
</html>
